name: Deploy my portfoloio on github pages
on: 
 push:
   branches: 
     - main
 workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
 build:
   runs-on: ubuntu-latest
   steps:
     - name: checkout code 
       uses: actions/checkout@v4
     - name: setup pages
       uses: actions/configure-pages@v5
     - name: Upload artifacts
       uses: actions/upload-pages-artifact@v3
       with:
         path: "."

 deploy:
   runs-on: ubuntu-latest
   needs: build
   environment:
      name: github-pages
      url: ${{ steps.deployment.output.page_url }}
   steps:
     - name: deploy on github pages
       id: deployment
       uses: actions/deploy-pages@v4
